version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: seadrop-mint-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
        required: false
    networks:
      - botnet

  redis:
    image: redis:7-alpine
    container_name: seadrop-redis
    restart: unless-stopped
    profiles:
      - redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - botnet

volumes:
  redis_data:

networks:
  botnet:
    driver: bridge
